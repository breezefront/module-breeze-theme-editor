<div class="bte-toolbar">
    <div class="bte-toolbar-container">
        <!-- Left Section -->
        <div class="bte-toolbar-left">
            <div id="bte-admin-link"></div>
            <div class="toolbar-divider"></div>
            <div id="toolbar-navigation"></div>
        </div>
        
        <!-- Center Section -->
        <div class="bte-toolbar-center">
            <!-- Publication Selector (Draft/Published switcher) -->
            <div id="bte-publication-selector"></div>
            
            <!-- Scope Selector (Store switcher) -->
            <div id="bte-scope-selector"></div>
            
            <!-- Page Selector (Page type navigator) -->
            <div id="bte-page-selector"></div>
        </div>
        
        <!-- Right Section -->
        <div class="bte-toolbar-right">
            <!-- Device Switcher (Desktop/Tablet/Mobile) -->
            <div id="bte-device-switcher"></div>
            
            <div class="toolbar-divider"></div>
            
            <!-- Toolbar Collapse Toggle -->
            <div id="bte-toolbar-toggle"></div>
            
            <!-- Exit Button -->
            <div id="bte-exit"></div>
        </div>
    </div>
</div>
