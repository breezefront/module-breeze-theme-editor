<div class="bte-field bte-field-spacing 
    <%= data.isModified ? 'bte-field-modified' : '' %> 
    <%= data.isDirty ? 'bte-field-dirty' : '' %>">
    <div class="bte-field-header">
        <label class="bte-field-label">
            <%= data.label %>
            <% if (data.required) { %>
                <span class="bte-required">*</span>
            <% } %>
        </label>
        <%= data.badgesHtml %>
    </div>

    <% if (data.description) { %>
        <div class="bte-field-description"><%= data.description %></div>
    <% } %>

    <div class="bte-field-control">
        <div class="bte-spacing-wrapper" 
            data-section="<%= data.sectionCode %>" 
            data-field="<%= data.code %>">
            
            <!-- Link/Unlink Button -->
            <div class="bte-spacing-controls">
                <button type="button" 
                    class="bte-spacing-link-toggle <%= data.spacing.linked ? 'bte-linked' : '' %>"
                    title="<%= data.spacing.linked ? 'Unlink sides' : 'Link all sides' %>"
                    data-linked="<%= data.spacing.linked ? '1' : '0' %>">
                    <span class="bte-link-icon">🔗</span>
                </button>
                
                <select class="bte-spacing-unit" data-current-unit="<%= data.spacing.unit %>">
                    <% data.allowedUnits.forEach(function(unit) { %>
                        <option value="<%= unit %>" <%= unit === data.spacing.unit ? 'selected' : '' %>><%= unit %></option>
                    <% }); %>
                </select>
            </div>

            <!-- Spacing Inputs -->
            <div class="bte-spacing-inputs">
                <!-- Top -->
                <div class="bte-spacing-input-group bte-spacing-top">
                    <label class="bte-spacing-label">Top</label>
                    <input
                        type="number"
                        class="bte-number-input bte-spacing-value"
                        data-side="top"
                        value="<%= data.spacing.top %>"
                        min="<%= data.min %>"
                        max="<%= data.max %>"
                        step="<%= data.step %>"
                    />
                </div>

                <!-- Right -->
                <div class="bte-spacing-input-group bte-spacing-right">
                    <label class="bte-spacing-label">Right</label>
                    <input
                        type="number"
                        class="bte-number-input bte-spacing-value"
                        data-side="right"
                        value="<%= data.spacing.right %>"
                        min="<%= data.min %>"
                        max="<%= data.max %>"
                        step="<%= data.step %>"
                    />
                </div>

                <!-- Bottom -->
                <div class="bte-spacing-input-group bte-spacing-bottom">
                    <label class="bte-spacing-label">Bottom</label>
                    <input
                        type="number"
                        class="bte-number-input bte-spacing-value"
                        data-side="bottom"
                        value="<%= data.spacing.bottom %>"
                        min="<%= data.min %>"
                        max="<%= data.max %>"
                        step="<%= data.step %>"
                    />
                </div>

                <!-- Left -->
                <div class="bte-spacing-input-group bte-spacing-left">
                    <label class="bte-spacing-label">Left</label>
                    <input
                        type="number"
                        class="bte-number-input bte-spacing-value"
                        data-side="left"
                        value="<%= data.spacing.left %>"
                        min="<%= data.min %>"
                        max="<%= data.max %>"
                        step="<%= data.step %>"
                    />
                </div>
            </div>

            <!-- Hidden input to store the actual value -->
            <input
                type="hidden"
                id="field-<%= data.sectionCode %>-<%= data.code %>"
                class="bte-spacing-hidden"
                value="<%= JSON.stringify(data.spacing) %>"
                data-section="<%= data.sectionCode %>"
                data-field="<%= data.code %>"
                data-css-var="<%= data.cssVar %>"
                data-type="spacing"
                data-default="<%= data.default %>"
                <%= data.required ? 'required' : '' %>
            />
        </div>
    </div>

    <% if (data.helpText) { %>
        <div class="bte-field-help"><%= data.helpText %></div>
    <% } %>
</div>
