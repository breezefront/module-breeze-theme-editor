<!-- Theme Editor Panel -->
<div class="bte-theme-editor-panel">
    <!-- Header -->
    <div class="bte-panel-header">
        <h2 class="bte-panel-title">
            <span class="bte-panel-icon"><i class="ph ph-pencil-simple" aria-hidden="true"></i></span>
            <%= data.title %>
        </h2>
        <button type="button" class="bte-panel-theme-toggle" title="Toggle panel theme">
            <!-- Moon: visible in dark mode, click → switch to light -->
            <i class="bte-theme-icon-moon ph ph-moon" aria-hidden="true"></i>
            <!-- Sun: visible in light mode, click → switch to dark -->
            <i class="bte-theme-icon-sun ph ph-sun" aria-hidden="true"></i>
        </button>
        <button type="button" class="bte-panel-close" title="<%= data.closeTitle %>">
            <span class="bte-icon">✕</span>
        </button>
    </div>

    <!-- Search -->
    <div class="bte-panel-search">
        <span class="bte-search-icon">
            <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
        </span>
        <input type="text" class="bte-search-input" placeholder="Search settings..." autocomplete="off">
        <button type="button" class="bte-search-clear" style="display:none;" title="Clear search">✕</button>
    </div>

    <!-- Content -->
    <div class="bte-panel-content">
        <!-- 🔥 LOADER STATE -->
        <div class="bte-panel-loader" style="display: none;">
            <div class="bte-loader-spinner"></div>
            <p class="bte-loader-text">Loading configuration...</p>
        </div>

        <!-- 🔥 ERROR STATE -->
        <div class="bte-panel-error" style="display: none;">
            <div class="bte-error-icon">⚠️</div>
            <h3 class="bte-error-title">Configuration Error</h3>
            <p class="bte-error-message"></p>
            <div class="bte-error-details" style="display: none;">
                <button type="button" class="bte-error-toggle">Show technical details</button>
                <pre class="bte-error-stack"></pre>
            </div>
            <button type="button" class="bte-button bte-button-secondary bte-error-retry">
                <span class="bte-icon">↺</span>
                Retry
            </button>
        </div>

        <!-- 🔥 DYNAMIC SECTIONS CONTAINER (rendered from GraphQL) -->
        <div class="bte-sections-container">
            <!-- Dynamically generated sections from field-renderer.js -->
        </div>
        
        <!-- 🎨 COLOR PALETTES -->
        <div class="bte-palette-container">
            <!-- Palette section widget will be here -->
        </div>

        <!-- FONT PALETTES -->
        <div class="bte-font-palette-container">
            <!-- fontPaletteSection widget will be here -->
        </div>
        
        <!-- ✨ PRESET SELECTOR (hidden - not yet implemented in adminhtml)
        <div class="bte-preset-container">
        </div>
        -->
    </div>

    <!-- Footer -->
    <div class="bte-panel-footer">
        <button type="button" class="bte-button bte-button-secondary bte-reset-button" disabled>
            <span class="bte-icon">↺</span>
            Reset
        </button>
        <button type="button" class="bte-button bte-button-primary bte-save-button" disabled>
            <span class="bte-icon">✓</span>
            Save (0)
        </button>
    </div>
</div>
