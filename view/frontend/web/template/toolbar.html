<div id="breeze-theme-editor-toolbar" class="breeze-theme-editor-toolbar">
    <div class="toolbar-container">
        <!-- Left Section -->
        <div class="toolbar-left">
            <div id="toolbar-admin-link"></div>
            <div class="toolbar-divider"></div>
            <div id="toolbar-navigation"></div>
        </div>

        <!-- Center Section -->
        <div class="toolbar-center">
            <div id="toolbar-publication-selector"></div>
            <div id="toolbar-scope-selector"></div>
            <div id="toolbar-page-selector"></div>
        </div>

        <!-- Right Section -->
        <div class="toolbar-right">
            <div id="toolbar-device-switcher"></div>
            <div class="toolbar-divider"></div>
            <div id="toolbar-highlight-toggle"></div>
            <div id="toolbar-toggle-button"></div>
            <div id="toolbar-exit-button"></div>
        </div>
    </div>
    <!-- Panels Container (поза toolbar, під ним) -->
    <div id="bte-panels-container" class="bte-panels-container">
        <!-- Theme Editor Panel (буде додано в наступному кроці) -->
        <div id="theme-editor-panel" class="bte-panel" style="display: none;">
        </div>

        <!-- Content Builder Panel (майбутнє) -->
        <div id="content-builder-panel" class="bte-panel" style="display: none;">
            <p>Content Builder Panel (placeholder)</p>
        </div>
    </div>
</div>

<!-- Compact toggle container -->
<div id="toolbar-compact-toggle"></div>
