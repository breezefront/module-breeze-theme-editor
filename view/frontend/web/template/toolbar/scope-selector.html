<div class="toolbar-selector toolbar-scope-selector">
    <% if (data.hasMultiple) { %>
        <button type="button" class="toolbar-select" data-toggle="dropdown">
            <span class="select-text"><%= data.currentScope %></span>
            <span class="select-arrow">
                <svg width="7" height="5" viewBox="0 0 7 5" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M3.35355 2.64645L6.00003 0L6.70713 0.70711L3.35355 4.06062L0 0.70711L0.70711 0L3.35355 2.64645Z" fill="currentColor"></path>
                </svg>
            </span>
        </button>
        <div class="toolbar-dropdown">
            <div class="dropdown-header">
                <span><%= data.dropdownTitle %></span>
            </div>
            <div class="dropdown-content">
                <% _.each(data.scopes, function(scope) { %>
                    <a href="<%= scope.url %>"
                       class="dropdown-item <%= scope.active ? 'active' : '' %>"
                       data-scope-id="<%= scope.id %>">
                        <span class="item-text"><%= scope.name %></span>
                        <% if (scope.active) { %>
                            <span class="item-check">✓</span>
                        <% } %>
                    </a>
                <% }); %>
            </div>
        </div>
    <% } else { %>
        <span class="toolbar-scope-text"><%= data.currentScope %></span>
    <% } %>
</div>
