<!-- Theme Editor Panel -->
<div class="bte-theme-editor-panel">
    <!-- Header -->
    <div class="bte-panel-header">
        <h2 class="bte-panel-title">
            <span class="bte-panel-icon"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.45997 1.87738L8.44664 0.890715C8.57046 0.766847 8.71747 0.668586 8.87927 0.601546C9.04107 0.534506 9.2145 0.5 9.38964 0.5C9.56478 0.5 9.73821 0.534506 9.90001 0.601546C10.0618 0.668586 10.2088 0.766847 10.3326 0.890715L11.2753 1.83338C11.5253 2.08342 11.6657 2.4225 11.6657 2.77605C11.6657 3.1296 11.5253 3.46868 11.2753 3.71872L10.2886 4.70538M7.45997 1.87738L1.04931 8.28738C0.82796 8.50873 0.69155 8.8009 0.663972 9.11272L0.502638 10.9394C0.493974 11.0365 0.506712 11.1343 0.539956 11.226C0.5732 11.3176 0.62614 11.4009 0.695045 11.4698C0.76395 11.5388 0.847143 11.5918 0.938761 11.6251C1.03038 11.6585 1.12819 11.6713 1.22531 11.6627L3.05197 11.5014C3.36426 11.4741 3.65695 11.3377 3.87864 11.116L10.2886 4.70538M7.45997 1.87738L10.2886 4.70538" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            <%= data.title %>
        </h2>
        <button type="button" class="bte-panel-close" title="<%= data.closeTitle %>">
            <span class="bte-icon">✕</span>
        </button>
    </div>

    <!-- Content -->
    <div class="bte-panel-content">
        <!-- 🔥 LOADER STATE -->
        <div class="bte-panel-loader" style="display: none;">
            <div class="bte-loader-spinner"></div>
            <p class="bte-loader-text">Loading configuration...</p>
        </div>

        <!-- 🔥 ERROR STATE -->
        <div class="bte-panel-error" style="display: none;">
            <div class="bte-error-icon">⚠️</div>
            <h3 class="bte-error-title">Configuration Error</h3>
            <p class="bte-error-message"></p>
            <div class="bte-error-details" style="display: none;">
                <button type="button" class="bte-error-toggle">Show technical details</button>
                <pre class="bte-error-stack"></pre>
            </div>
            <button type="button" class="bte-button bte-button-secondary bte-error-retry">
                <span class="bte-icon">↺</span>
                Retry
            </button>
        </div>

        <!-- 🔥 DYNAMIC SECTIONS CONTAINER (rendered from GraphQL) -->
        <div class="bte-sections-container">
            <!-- Динамічно згенеровані секції з field-renderer.js -->
        </div>
        
        <!-- 🎨 COLOR PALETTES -->
        <div class="bte-palette-container">
            <!-- Palette section widget буде тут -->
        </div>
        
        <!-- ✨ PRESET SELECTOR -->
        <div class="bte-preset-container">
            <!-- Preset selector widget буде тут -->
        </div>
    </div>

    <!-- Footer -->
    <div class="bte-panel-footer">
        <button type="button" class="bte-button bte-button-secondary bte-reset-button" disabled>
            <span class="bte-icon">↺</span>
            Reset
        </button>
        <button type="button" class="bte-button bte-button-primary bte-save-button" disabled>
            <span class="bte-icon">✓</span>
            Save (0)
        </button>
    </div>
</div>
