<div class="bte-field-group bte-field-color <%= data.isModified ? 'bte-field-modified' : '' %>">
    <label class="bte-field-label" for="<%= data.fieldId %>">
        <%= data.label %>
        <% if (data.required) { %>
            <span class="bte-required">*</span>
        <% } %>
    </label>

    <% if (data.hasDescription) { %>
        <p class="bte-field-description"><%= data.description %></p>
    <% } %>

    <div class="bte-color-picker-wrapper">
        <input type="color"
               id="<%= data.fieldId %>"
               class="bte-color-picker"
               value="<%= data.value %>"
               <%= data.dataAttrs %>
               <% if (data.required) { %>required<% } %>>
        <input type="text"
               class="bte-color-input"
               value="<%= data.value %>"
               placeholder="<%= data.placeholder || '#000000' %>"
               pattern="<%= data.validation.pattern || '^#[0-9A-Fa-f]{6}$' %>">
    </div>

    <% if (data.isModified) { %>
        <span class="bte-badge bte-badge-modified">Modified</span>
    <% } %>

    <% if (data.hasHelpText) { %>
        <small class="bte-field-help"><%= data.helpText %></small>
    <% } %>
</div>
