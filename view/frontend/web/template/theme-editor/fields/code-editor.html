<div class="bte-field-group bte-field-code">
    <label class="bte-field-label" for="<%= data.fieldId %>">
        <%= data.label %>
        <% if (data.required) { %>
            <span class="bte-required">*</span>
        <% } %>
        <% if (data.params.language) { %>
            <span class="bte-code-language"><%= data.params.language.toUpperCase() %></span>
        <% } %>
    </label>

    <% if (data.hasDescription) { %>
        <p class="bte-field-description"><%= data.description %></p>
    <% } %>

    <textarea id="<%= data.fieldId %>"
              class="bte-code-editor"
              rows="<%= data.params.rows || 10 %>"
              placeholder="<%= data.placeholder || '/* Your ' + (data.params.language || 'CSS') + ' code */' %>"
              <%= data.dataAttrs %>
              data-language="<%= data.params.language || 'css' %>"
              <% if (data.required) { %>required<% } %>><%= data.value %></textarea>

    <% if (data.hasHelpText) { %>
        <small class="bte-field-help"><%= data.helpText %></small>
    <% } %>
</div>
