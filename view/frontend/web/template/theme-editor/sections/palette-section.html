<div class="bte-palette-section">
    <div class="bte-palette-header">
        <span class="bte-palette-title">🎨 Color Palettes</span>
        
        <!-- Header actions container -->
        <div class="bte-palette-header-actions">
            <!-- Reset button (hidden by default, shown when dirty) -->
            <button type="button" 
                    class="bte-palette-reset-btn" 
                    title="Reset all palette changes"
                    style="display: none;">
                <i class="bte-icon-reset">↻</i>
                <span class="bte-reset-count"></span>
            </button>
            <i class="bte-icon-chevron-down bte-palette-arrow"></i>
        </div>
    </div>
    
    <div class="bte-palette-content">
        <div class="bte-palette-grid">
            <!-- Groups will be rendered here by JS -->
        </div>
    </div>
</div>
