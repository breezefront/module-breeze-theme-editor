<!-- Preset Selector Widget -->
<div class="bte-preset-selector">
    <div class="bte-preset-header">
        <div class="bte-preset-label">
            <span>📋 Apply Preset</span>
        </div>
        <i class="bte-icon-chevron-down bte-preset-arrow"></i>
    </div>
    
    <div class="bte-preset-content">
        <div class="bte-preset-dropdown">
            <select class="bte-preset-select">
                <option value="">Select a preset...</option>
            </select>
        </div>
        
        <!-- Expanded Preview (hidden by default) -->
        <div class="bte-preset-preview" style="display: none;">
            <div class="bte-preset-description"></div>
            
            <div class="bte-preset-warning">
                <span>⚠️</span>
                <span class="bte-preset-changes-count"></span>
            </div>
            
            <div class="bte-preset-actions">
                <button type="button" class="bte-button bte-button-secondary bte-preset-cancel">
                    Cancel
                </button>
                <button type="button" class="bte-button bte-button-primary bte-preset-apply">
                    Apply Preset
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Overwrite Dialog (hidden by default) -->
<div class="bte-preset-dialog" style="display: none;">
    <div class="bte-dialog-overlay"></div>
    <div class="bte-dialog-content">
        <div class="bte-dialog-header">
            <h3>⚠️ Unsaved Changes</h3>
        </div>
        <div class="bte-dialog-body">
            <p>You have <strong class="bte-unsaved-count"></strong> unsaved changes.</p>
            <p>How do you want to apply this preset?</p>
            
            <div class="bte-radio-group">
                <label class="bte-radio-option">
                    <input type="radio" name="overwrite" value="merge" checked>
                    <div class="bte-radio-content">
                        <strong>Keep my changes (merge)</strong>
                        <span class="bte-radio-description">Preset will only apply to unchanged settings</span>
                    </div>
                </label>
                <label class="bte-radio-option">
                    <input type="radio" name="overwrite" value="overwrite">
                    <div class="bte-radio-content">
                        <strong>Replace all (overwrite)</strong>
                        <span class="bte-radio-description">Discard my changes and use preset values</span>
                    </div>
                </label>
            </div>
        </div>
        <div class="bte-dialog-footer">
            <button type="button" class="bte-button bte-button-secondary bte-dialog-cancel">
                Cancel
            </button>
            <button type="button" class="bte-button bte-button-primary bte-dialog-confirm">
                Continue
            </button>
        </div>
    </div>
</div>
